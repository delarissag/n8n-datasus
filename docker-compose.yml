version: '3.8'

networks:
  datasus_net:
    name: datasus_net

services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    container_name: mysql_datasus
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: indicadores_sus
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:z
    networks:
      - datasus_net
    # Healthcheck é obrigatório para garantir que o banco já carregou as tabelas
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      timeout: 20s
      retries: 10

  n8n:
    build:
      context: .
      dockerfile: docker/n8n.Dockerfile
    container_name: n8n_datasus
    user: "root"
    privileged: true
    restart: unless-stopped
    security_opt:
      - label=disable
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - GENERIC_TIMEZONE=America/Campo_Grande
    volumes:
      - n8n_data:/home/node/.n8n
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dados_datasus:/data:z    # Correção do SELinux aplicada aqui
      - ./scripts:/scripts:z       # Correção do SELinux aplicada aqui
    depends_on:
      mysql:
        condition: service_healthy # Só liga o n8n quando o ping do banco der OK
    networks:
      - datasus_net

  # Instruções para o Coolify buildar suas ferramentas ETL
  datasus-cli:
    build:
      context: ./datasus-scripts-fix
      dockerfile: ../docker/datasus-cli.Dockerfile
    image: datasus-scripts-local
    command: ["echo", "Extrator Datasus Buildado e Pronto!"]

  python-consolidador:
    build:
      context: .
      dockerfile: docker/python-consolidador.Dockerfile
    image: python-consolidador-local
    command: ["echo", "Python Consolidador Buildado e Pronto!"]

volumes:
  mysql_data:
  n8n_data:
